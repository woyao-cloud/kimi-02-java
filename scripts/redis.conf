# Redis 配置文件
# 用户管理系统 - Redis 配置

# 网络绑定
bind 0.0.0.0
port 6379

# 保护模式
protected-mode no

# 密码认证 (建议在生产环境设置)
# requirepass redis123

# 持久化配置
save 900 1
save 300 10
save 60 10000

# 启用 AOF 持久化
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# 内存配置
maxmemory 256mb
maxmemory-policy allkeys-lru

# 日志配置
loglevel notice

# 数据库数量
databases 16

# 客户端超时
timeout 300
tcp-keepalive 60

# 慢查询日志
slowlog-log-slower-than 10000
slowlog-max-len 128
